# ============================================================
# Custom sysctl configuration for openSUSE Tumbleweed
# Optimized for: desktop multimedia, streaming, web development,
#                fibre broadband, KVM virtualization, Squid + Unbound
# Last updated : 2026-04-04 (rev2)
# Author       : crisis1er
# Deploy to    : /etc/sysctl.d/99-custom.conf
# Apply with   : sudo sysctl --system
# ============================================================

##############################
# 1. Memory management
##############################

# Reduce swap pressure — prioritize RAM; 30 is balanced for zram/zstd
vm.swappiness = 30

# Favor inode/dentry cache to speed up filesystem lookups
vm.vfs_cache_pressure = 40

# Writeback thresholds in bytes (replaces ratio-based settings for USB SSD + VMs)
vm.dirty_background_bytes = 67108864
vm.dirty_bytes = 268435456

# Flush dirty pages every 15s (default 500 centisecs is too frequent for USB SSD)
vm.dirty_writeback_centisecs = 1500
vm.dirty_expire_centisecs = 3000

# Required by browsers (Firefox/Chromium) and Kodi — large mmap count
vm.max_map_count = 262144

# Minimum free memory reserved for kernel — prevents Btrfs deadlocks under pressure
vm.min_free_kbytes = 131072

# OOM killer targets the process that triggered the allocation instead of random victim
vm.oom_kill_allocating_task = 1

##############################
# 2. Network — buffers and queues
##############################

# Packet queue depth — tuned for desktop + streaming + Squid + Unbound
net.core.netdev_max_backlog = 4096
net.core.somaxconn = 4096

# Socket receive/send buffers — 8 MB max, adequate for fibre
net.core.rmem_default = 1048576
net.core.rmem_max = 8388608
net.core.wmem_default = 1048576
net.core.wmem_max = 8388608

# Ancillary data buffer
net.core.optmem_max = 65536

# Packet processing budget per NAPI poll cycle
net.core.netdev_budget = 600
net.core.netdev_budget_usecs = 8000

# Fair Queue scheduler — smoother latency under load
net.core.default_qdisc = fq

# Harden BPF JIT against Spectre-type attacks
net.core.bpf_jit_harden = 2

##############################
# 3. TCP/IP & connections
##############################

net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192

# Reuse TIME_WAIT sockets for outgoing connections (safe with timestamps on)
net.ipv4.tcp_tw_reuse = 1

# Reduce FIN_WAIT2 timeout (default 60s — excessive for desktop)
net.ipv4.tcp_fin_timeout = 10

# Do not reset congestion window after idle (benefits streaming, DoT, Squid)
net.ipv4.tcp_slow_start_after_idle = 0

# TCP keepalive — detect dead connections faster
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6

# Enable MTU probing to avoid PMTU black holes
net.ipv4.tcp_mtu_probing = 1

# TCP window scaling — required for high-bandwidth flows
net.ipv4.tcp_window_scaling = 1

# Limit TIME_WAIT sockets to save memory
net.ipv4.tcp_max_tw_buckets = 65536

# Limit orphaned sockets
net.ipv4.tcp_max_orphans = 16384

# TCP timestamps — required for tcp_tw_reuse and RTTM
net.ipv4.tcp_timestamps = 1

net.ipv4.tcp_notsent_lowat = 16384
net.ipv4.tcp_moderate_rcvbuf = 1

# BBR congestion control — lower latency and better throughput on fibre
net.ipv4.tcp_congestion_control = bbr

# SYN flood protection
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 1024

# TCP buffers — min/default/max in bytes
net.ipv4.tcp_rmem = 4096 87380 8388608
net.ipv4.tcp_wmem = 4096 65536 8388608

# TCP Fast Open for both incoming and outgoing connections
net.ipv4.tcp_fastopen = 3

# Explicit Congestion Notification
net.ipv4.tcp_ecn = 1

# Fewer SYN retries — faster failure detection
net.ipv4.tcp_syn_retries = 3

##############################
# 4. Network security — IPv4
##############################

# Ephemeral port range — avoids conflicts with well-known ports
net.ipv4.ip_local_port_range = 30000 65535

# Reverse path filtering — drop packets with spoofed source addresses
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Log martian packets disabled — too noisy on desktop
net.ipv4.conf.default.log_martians = 0
net.ipv4.conf.all.log_martians = 0

# IP forwarding — required for KVM bridge and Squid transparent proxy
net.ipv4.ip_forward = 1

# Disable ICMP redirects — prevent MITM route injection
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Disable source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# RFC 1337 fix — drop RST packets from TIME_WAIT sockets
net.ipv4.tcp_rfc1337 = 1

##############################
# 5. IPv6
##############################

# Forwarding required for KVM bridge
net.ipv6.conf.all.forwarding = 1

# Accept Router Advertisements even with forwarding enabled
net.ipv6.conf.all.accept_ra = 2
net.ipv6.conf.default.accept_ra = 2

# SLAAC autoconfiguration
net.ipv6.conf.all.autoconf = 1
net.ipv6.conf.default.autoconf = 1

# Disable redirects and source routing (same hardening as IPv4)
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

##############################
# 6. Netfilter / Conntrack
##############################

# Connection tracking table size — tuned for desktop + VMs + Squid + firewalld
net.netfilter.nf_conntrack_max = 131072

# Reduce ESTABLISHED TCP timeout (default is 5 days — unnecessary for desktop/proxy)
net.netfilter.nf_conntrack_tcp_timeout_established = 86400

##############################
# 7. Kernel hardening
##############################

# Restrict kernel log access to root only
kernel.dmesg_restrict = 1

# Hide kernel pointers from unprivileged users
kernel.kptr_restrict = 2

# Restrict perf events to root
kernel.perf_event_paranoid = 2

# Disable unprivileged eBPF — significant attack surface reduction
kernel.unprivileged_bpf_disabled = 1

# SysRq — selective: enable SAK, kernel dumps, remount-ro, reboot (244 = safe subset)
kernel.sysrq = 244

# Auto-reboot 10 seconds after a kernel panic
kernel.panic = 10

# Full ASLR — randomize all memory regions including heap
kernel.randomize_va_space = 2

# Restrict ptrace to parent processes only (protects against local privilege escalation)
kernel.yama.ptrace_scope = 1

##############################
# 8. Filesystem — inotify
##############################

# Raised for IDEs, file managers, streaming apps, and systemd journal
fs.inotify.max_user_watches = 131072
fs.inotify.max_user_instances = 2048

# Hugepages — disabled (enable only if running memory-intensive VMs or databases)
# vm.nr_hugepages = 64

##############################
# 9. Kernel log filtering
##############################

# Show warnings and errors only — reduces noise in logs and journald
kernel.printk = 3 4 1 3
kernel.printk_ratelimit = 5
kernel.printk_ratelimit_burst = 10

